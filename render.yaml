
services:
  - type: web
    name: paint_online_back
    runtime: node

    buildCommand: npm run build && cd server && npm install
    startCommand: node server/index.js

    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=1024
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: paint_online_db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: paint_online_redis
          property: connectionString

databases:
  - name: paint_online_db
    databaseName: paint_online
    user: paint_online

